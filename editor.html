<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editor de fotos - EES N°1 (uso interno)</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --azul: #1a3a6b;
    --azul-claro: #2563a8;
    --dorado: #c8923a;
    --crema: #f5f0e8;
    --gris: #6b7280;
    --blanco: #ffffff;
    --verde: #3B6D11;
    --verde-bg: #EAF3DE;
    --naranja: #c8580a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--crema); color: #2c2c2c; min-height: 100vh; }

  header { background: var(--azul); padding: 22px 24px 16px; text-align: center; border-bottom: 4px solid var(--dorado); }
  header h1 { font-family: 'Playfair Display', serif; color: var(--blanco); font-size: 22px; font-weight: 700; }
  header p { color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 4px; }

  .aviso { background: #FEF0E6; border-left: 4px solid var(--naranja); padding: 10px 16px; font-size: 12px; color: var(--naranja); margin: 16px; border-radius: 0 8px 8px 0; }

  .barra-busqueda { padding: 0 16px 12px; }
  .barra-busqueda input { width: 100%; border: 1px solid #d1c9bc; border-radius: 8px; padding: 9px 14px; font-size: 14px; background: var(--blanco); outline: none; }
  .barra-busqueda input:focus { border-color: var(--azul-claro); }

  .contenido { padding: 0 16px 30px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .item { background: var(--blanco); border: 1px solid #e5ddd0; border-radius: 10px; overflow: hidden; cursor: pointer; transition: transform 0.15s; }
  .item:hover { transform: translateY(-2px); }
  .item img { width: 100%; height: 100px; object-fit: cover; display: block; background: #e8e0d4; }
  .item .info { padding: 6px 8px; }
  .item .promo { font-size: 10px; color: var(--azul-claro); font-weight: 600; }
  .item .desc { font-size: 11px; color: var(--gris); margin-top: 2px; line-height: 1.3; max-height: 28px; overflow: hidden; }

  .cargando { text-align: center; padding: 60px 20px; color: var(--gris); }
  .spinner { width: 32px; height: 32px; border: 3px solid #e5ddd0; border-top-color: var(--azul); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL EDITOR */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 14px; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--blanco); border-radius: 14px; max-width: 460px; width: 100%; max-height: 95vh; overflow-y: auto; }
  .modal-header { padding: 14px 16px 8px; }
  .modal-header h3 { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--azul); }
  .modal-header p { font-size: 11px; color: var(--gris); margin-top: 2px; }

  .editor-stage { position: relative; width: 100%; aspect-ratio: 1/1; background: #111; overflow: hidden; touch-action: none; user-select: none; }
  .editor-stage img { position: absolute; top: 50%; left: 50%; max-width: 100%; max-height: 100%; transform: translate(-50%,-50%) rotate(0deg); transition: transform 0.15s; pointer-events: none; -webkit-user-drag: none; user-select: none; }
  .crop-box { position: absolute; border: 2px dashed var(--dorado); background: rgba(200,146,58,0.12); display: none; }
  .crop-box.activo { display: block; }

  .editor-controles { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .fila-botones { display: flex; gap: 8px; }
  .btn-control { flex: 1; background: var(--crema); border: 1px solid #d1c9bc; border-radius: 8px; padding: 9px; font-size: 13px; color: var(--azul); cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-control:active { background: #e8e0d4; }
  .hint-editor { font-size: 11px; color: var(--gris); text-align: center; }

  .modal-acciones { display: flex; gap: 8px; padding: 12px 16px 16px; }
  .btn-cancelar { flex: 1; background: var(--crema); border: 1px solid #d1c9bc; color: var(--gris); border-radius: 8px; padding: 11px; font-size: 14px; cursor: pointer; }
  .btn-guardar { flex: 2; background: var(--azul); border: none; color: white; border-radius: 8px; padding: 11px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .btn-guardar:disabled { background: #9ca3af; cursor: not-allowed; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--verde); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; display: none; z-index: 200; }
  .toast.visible { display: block; }
</style>
</head>
<body>

<header>
  <h1>🛠️ Editor de fotos</h1>
  <p>Herramienta interna · Galería Histórica EES N°1</p>
</header>

<div class="aviso">Esta página no es pública. Acá podés rotar y recortar las fotos ya publicadas.</div>

<div class="barra-busqueda">
  <input type="text" id="buscador" placeholder="Buscar por descripción, nombre o año...">
</div>

<div class="contenido">
  <div id="cargando" class="cargando"><div class="spinner"></div>Cargando fotos...</div>
  <div id="grid" class="grid"></div>
</div>

<!-- Modal editor -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-titulo">Editar foto</h3>
      <p id="modal-sub"></p>
    </div>

    <div class="editor-stage" id="stage">
      <img id="img-editor" src="" alt="Editando" draggable="false" ondragstart="return false;">
      <div class="crop-box" id="crop-box"></div>
    </div>

    <div class="editor-controles">
      <div class="fila-botones">
        <button class="btn-control" onclick="rotar(-90)">↺ Girar izquierda</button>
        <button class="btn-control" onclick="rotar(90)">↻ Girar derecha</button>
      </div>
      <div class="fila-botones">
        <button class="btn-control" onclick="quitarRecorte()">🗑️ Quitar recorte</button>
        <button class="btn-control" onclick="reiniciarTodo()">↩️ Reiniciar todo</button>
      </div>
      <div class="hint-editor">⚠️ Primero girá la foto si lo necesitás, después recortá. Girar borra el recorte.</div>
    </div>

    <div class="modal-acciones">
      <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-guardar" id="btn-guardar" onclick="guardarEdicion()">Guardar cambios</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_ID = "1YiiJ7JbwM1Hjzm2t-fJVfazjtpWf7Xjyp7nLSSAXQDw";
const SHEET_NAME = "Respuestas de formulario 1";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzChFqVzrWMuv0KgxoTbkD1cFHei6C5s8FcGYOuNHexEeVtpefu6xSocGNLv2VULikpKw/exec";
const URL_SHEET = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;

let fotos = [];
let fotoEditando = null;
let rotacion = 0;
let crop = null; // {x, y, w, h} en fracciones 0-1, relativas a la imagen ya rotada

async function cargarFotos() {
  try {
    const res = await fetch(URL_SHEET);
    const texto = await res.text();
    const json = JSON.parse(texto.substring(47, texto.length - 2));
    const filas = json.table.rows;

    fotos = filas
      .map((f, idx) => ({
        rowIndex: idx + 2,
        estado: f.c[7] && f.c[7].v ? f.c[7].v.toString().trim().toUpperCase() : "",
        promo: f.c[2] && f.c[2].v !== null && f.c[2].v !== undefined ? f.c[2].v.toString().trim() : "",
        nombre: f.c[1] ? f.c[1].v : "",
        quienes: f.c[3] ? f.c[3].v : "",
        desc: f.c[4] ? f.c[4].v : "",
        foto: f.c[6] ? f.c[6].v : ""
      }))
      .filter(f => f.estado === "APROBADO" && f.promo !== "FEEDBACK" && f.foto);

    document.getElementById("cargando").style.display = "none";
    renderGrid(fotos);
  } catch(e) {
    document.getElementById("cargando").innerHTML = "❌ No se pudo cargar. Verificá el Sheet.";
  }
}

function renderGrid(lista) {
  const grid = document.getElementById("grid");
  if (lista.length === 0) {
    grid.innerHTML = '<p style="color:#6b7280;padding:20px">No se encontraron fotos.</p>';
    return;
  }
  grid.innerHTML = lista.map((f) => `
    <div class="item" onclick="abrirEditor(${f.rowIndex})">
      <img src="${f.foto}" loading="lazy" alt="">
      <div class="info">
        <div class="promo">${f.promo || "Sin año"}</div>
        <div class="desc">${(f.desc || "Sin descripción")}</div>
      </div>
    </div>
  `).join("");
}

document.getElementById("buscador").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase();
  const filtradas = fotos.filter(f =>
    (f.desc || "").toLowerCase().includes(q) ||
    (f.quienes || "").toLowerCase().includes(q) ||
    (f.nombre || "").toLowerCase().includes(q) ||
    (f.promo || "").toLowerCase().includes(q)
  );
  renderGrid(filtradas);
});

let urlOriginalActual = "";

function abrirEditor(rowIndex) {
  fotoEditando = fotos.find(f => f.rowIndex === rowIndex);
  if (!fotoEditando) return;

  // Detectar si la foto ya tenía rotación/recorte de una edición anterior
  const previo = parsearTransformacionActual(fotoEditando.foto);
  rotacion = previo.rot;
  crop = previo.crop;
  urlOriginalActual = obtenerUrlOriginal(fotoEditando.foto);

  document.getElementById("modal-titulo").textContent = fotoEditando.promo || "Sin año";
  document.getElementById("modal-sub").textContent = (fotoEditando.desc || "Sin descripción").substring(0, 70);
  document.getElementById("img-editor").src = urlOriginalActual;
  document.getElementById("img-editor").style.transform = `translate(-50%,-50%) rotate(${rotacion}deg)`;
  document.getElementById("crop-box").classList.remove("activo");
  document.getElementById("btn-guardar").disabled = false;
  document.getElementById("btn-guardar").textContent = "Guardar cambios";

  document.getElementById("modal").classList.add("visible");
}

function cerrarModal() {
  document.getElementById("modal").classList.remove("visible");
}

function rotar(grados) {
  rotacion = (rotacion + grados + 360) % 360;
  document.getElementById("img-editor").style.transform = `translate(-50%,-50%) rotate(${rotacion}deg)`;
  quitarRecorte();
}

function quitarRecorte() {
  crop = null;
  const box = document.getElementById("crop-box");
  box.classList.remove("activo");
  box.style.width = "0px";
  box.style.height = "0px";
}

function reiniciarTodo() {
  rotacion = 0;
  document.getElementById("img-editor").style.transform = "translate(-50%,-50%) rotate(0deg)";
  quitarRecorte();
}

// --- Drag para crear el recorte ---
const stage = document.getElementById("stage");
const cropBox = document.getElementById("crop-box");
let dragInicio = null;

function getPos(e) {
  const rect = stage.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: clientX - rect.left, y: clientY - rect.top, rect };
}

function iniciarDrag(e) {
  e.preventDefault();
  dragInicio = getPos(e);
  cropBox.classList.add("activo");
  cropBox.style.left = dragInicio.x + "px";
  cropBox.style.top = dragInicio.y + "px";
  cropBox.style.width = "0px";
  cropBox.style.height = "0px";
}

function moverDrag(e) {
  if (!dragInicio) return;
  e.preventDefault();
  const pos = getPos(e);
  posFinal = pos;
  const x = Math.min(dragInicio.x, pos.x);
  const y = Math.min(dragInicio.y, pos.y);
  const w = Math.abs(pos.x - dragInicio.x);
  const h = Math.abs(pos.y - dragInicio.y);
  cropBox.style.left = x + "px";
  cropBox.style.top = y + "px";
  cropBox.style.width = w + "px";
  cropBox.style.height = h + "px";
}

let posFinal = null;

function finalizarDrag(e) {
  if (!dragInicio) return;
  const pos = posFinal || dragInicio;
  const stageRect = stage.getBoundingClientRect();
  const imgRect = document.getElementById("img-editor").getBoundingClientRect();

  const x1stage = Math.min(dragInicio.x, pos.x);
  const y1stage = Math.min(dragInicio.y, pos.y);
  const wstage = Math.abs(pos.x - dragInicio.x);
  const hstage = Math.abs(pos.y - dragInicio.y);

  if (wstage < 15 || hstage < 15) {
    quitarRecorte();
    dragInicio = null;
    posFinal = null;
    return;
  }

  // Convertir coordenadas de pantalla a fracciones relativas a la IMAGEN (no al contenedor)
  const offsetX = imgRect.left - stageRect.left;
  const offsetY = imgRect.top - stageRect.top;

  let x = (x1stage - offsetX) / imgRect.width;
  let y = (y1stage - offsetY) / imgRect.height;
  let w = wstage / imgRect.width;
  let h = hstage / imgRect.height;

  x = Math.max(0, Math.min(1, x));
  y = Math.max(0, Math.min(1, y));
  w = Math.max(0.02, Math.min(1 - x, w));
  h = Math.max(0.02, Math.min(1 - y, h));

  crop = { x, y, w, h };
  dragInicio = null;
  posFinal = null;
}

stage.addEventListener("mousedown", iniciarDrag);
stage.addEventListener("mousemove", moverDrag);
stage.addEventListener("mouseup", finalizarDrag);
stage.addEventListener("touchstart", iniciarDrag, { passive: false });
stage.addEventListener("touchmove", moverDrag, { passive: false });
stage.addEventListener("touchend", finalizarDrag);

function obtenerUrlOriginal(url) {
  const match = url.match(/^(https:\/\/res\.cloudinary\.com\/[^/]+\/image\/upload\/)(?:.*\/)?(v\d+\/.+)$/);
  if (!match) return url;
  return match[1] + match[2];
}

function parsearTransformacionActual(url) {
  let rot = 0, cropActual = null;
  const rotMatch = url.match(/\/a_(-?\d+)(?:\/|,)/);
  if (rotMatch) rot = parseInt(rotMatch[1]);
  const cropMatch = url.match(/c_crop,fl_relative,x_([\d.]+),y_([\d.]+),w_([\d.]+),h_([\d.]+)/);
  if (cropMatch) {
    cropActual = {
      x: parseFloat(cropMatch[1]),
      y: parseFloat(cropMatch[2]),
      w: parseFloat(cropMatch[3]),
      h: parseFloat(cropMatch[4])
    };
  }
  return { rot, crop: cropActual };
}

function construirUrlEditada(urlOriginal, rotacion, crop) {
  // Extraer base + sufijo (version/carpeta/archivo), descartando cualquier transformación previa
  const match = urlOriginal.match(/^(https:\/\/res\.cloudinary\.com\/[^/]+\/image\/upload\/)(?:.*\/)?(v\d+\/.+)$/);
  if (!match) return urlOriginal;
  const base = match[1];
  const sufijo = match[2];

  let segmentos = [];
  if (rotacion && rotacion !== 0) segmentos.push(`a_${rotacion}`);
  if (crop) {
    const x = Math.max(0, Math.min(1, crop.x)).toFixed(4);
    const y = Math.max(0, Math.min(1, crop.y)).toFixed(4);
    const w = Math.max(0.05, Math.min(1, crop.w)).toFixed(4);
    const h = Math.max(0.05, Math.min(1, crop.h)).toFixed(4);
    segmentos.push(`c_crop,fl_relative,x_${x},y_${y},w_${w},h_${h}`);
  }

  if (segmentos.length === 0) return base + sufijo;
  return base + segmentos.join("/") + "/" + sufijo;
}

async function guardarEdicion() {
  if (!fotoEditando) return;
  if (rotacion === 0 && !crop) {
    mostrarToast("No hiciste ningún cambio.");
    return;
  }

  const btn = document.getElementById("btn-guardar");
  btn.disabled = true;
  btn.textContent = "Guardando...";

  const nuevaUrl = construirUrlEditada(urlOriginalActual, rotacion, crop);

  try {
    const params = new URLSearchParams({
      action: "updateFoto",
      row: fotoEditando.rowIndex,
      foto: nuevaUrl
    });
    await fetch(SCRIPT_URL + "?" + params.toString(), { mode: "no-cors" });

    // Actualizar localmente
    fotoEditando.foto = nuevaUrl;
    renderGrid(fotos);

    mostrarToast("✅ Cambios guardados");
    setTimeout(cerrarModal, 600);
  } catch(e) {
    mostrarToast("❌ Error al guardar");
  }
  btn.disabled = false;
  btn.textContent = "Guardar cambios";
}

function mostrarToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("visible");
  setTimeout(() => t.classList.remove("visible"), 2500);
}

cargarFotos();
</script>
</body>
</html>
